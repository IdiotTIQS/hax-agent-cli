<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b10" />
    <title>Hax Agent — AI 编程助手</title>
    <style>
      /* Prevent FOUC — inline critical styles before Vue mounts */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #090b10;
        color: #e4e7f0;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-family: 'DM Sans', system-ui, sans-serif;
        color: #5f6680;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">Hax Agent 正在启动...</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
